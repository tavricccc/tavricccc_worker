name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Inject GITHUB_CLIENT_ID into wrangler.toml
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GITHUB_CLIENT_ID }}
        run: |
          if [ ! -z "$GITHUB_CLIENT_ID" ]; then
            sed -i "s/PLACEHOLDER_GITHUB_CLIENT_ID/$GITHUB_CLIENT_ID/g" wrangler.toml
          fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          secrets: |
            GITHUB_CLIENT_SECRET
            RESEND_API_KEY
            TURNSTILE_SECRET_KEY
            CONTACT_TO_EMAIL
            ADMIN_EMAILS
            MODERATION_SECRET
        env:
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          MODERATION_SECRET: ${{ secrets.MODERATION_SECRET }}
