name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate wrangler.toml from example
        run: |
          cp wrangler.toml.example wrangler.toml
          sed -i "s/tavrics-worker/tavricccc-worker/g" wrangler.toml
          sed -i "s/YOUR_SUBDOMAIN/tavric/g" wrangler.toml
          sed -i "s/tavrics-d1/tavricccc-d1/g" wrangler.toml
          sed -i "s/YOUR_D1_DATABASE_ID/5d4828ad-6fa0-476a-b439-a096a3b4c918/g" wrangler.toml
          sed -i "s/tavrics-images/tavricccc-images/g" wrangler.toml
          sed -i "s/YOUR_RATE_LIMIT_KV_NAMESPACE_ID/4986ca8080d14da4b9033b9d000457f5/g" wrangler.toml
          sed -i "s/YOUR_MODERATION_KV_NAMESPACE_ID/4730f831b49a4fa5804ad02a9b0dea26/g" wrangler.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Inject GITHUB_CLIENT_ID into wrangler.toml
        env:
          GITHUB_CLIENT_ID: ${{ secrets.GH_CLIENT_ID }}
        run: |
          if [ ! -z "$GITHUB_CLIENT_ID" ]; then
            sed -i "s/PLACEHOLDER_GITHUB_CLIENT_ID/$GITHUB_CLIENT_ID/g" wrangler.toml
          fi

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          secrets: |
            GITHUB_CLIENT_SECRET
            RESEND_API_KEY
            TURNSTILE_SECRET_KEY
            CONTACT_TO_EMAIL
            ADMIN_EMAILS
            MODERATION_SECRET
        env:
          GITHUB_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          CONTACT_TO_EMAIL: ${{ secrets.CONTACT_TO_EMAIL }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          MODERATION_SECRET: ${{ secrets.MODERATION_SECRET }}
